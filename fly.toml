# fly.toml app configuration file generated for duo-nakijken on 2026-07-07T10:32:10+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'duo-nakijken'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DEMO_MANUAL_SCORES_PATH = '/data/demo-manual-scores.json'
  SPRING_PROFILES_ACTIVE = 'fly'

[[mounts]]
  source = 'duo_nakijken_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
